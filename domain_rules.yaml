# Teamo · 初始域名规则库（v1）
#
# 用途：桌面端打包内置一份；登录后从云端 GET /api/rules 拉增量更新合并
# 三种规则类型：
#   - parse_as_content : 内容页，云端调 link_cards 解析为卡片
#   - skip_parse       : 上云但不解析（搜索页/工具页等无解析价值）
#   - skip_upload      : 端侧拦截不上云（登录页/支付页/纯密码场景）
#
# pattern 语法：
#   - "domain.com"           - 整个域名命中
#   - "domain.com/path"      - 域名 + 路径前缀
#   - "domain.com/path/*"    - 通配符
#   - "*.domain.com"         - 子域名通配
#
# priority 大者优先；同 priority 时 skip_upload > skip_parse > parse_as_content
# version 字段标识规则库版本，桌面端拉新规则用 since=<version> 增量

version: 1
updated_at: 2026-04-15

rules:

  # ===========================================================================
  # 国内主流内容平台 → parse_as_content
  # ===========================================================================
  - pattern: "douyin.com/video/*"
    type: parse_as_content
    priority: 100
    note: "抖音视频，解析为视频卡片（标题/作者/封面/字幕）"

  - pattern: "v.douyin.com/*"
    type: parse_as_content
    priority: 100
    note: "抖音短链分享"

  - pattern: "iesdouyin.com/*"
    type: parse_as_content
    priority: 100
    note: "抖音备用域名"

  - pattern: "bilibili.com/video/*"
    type: parse_as_content
    priority: 100
    note: "B 站视频"

  - pattern: "b23.tv/*"
    type: parse_as_content
    priority: 100
    note: "B 站短链"

  - pattern: "xiaohongshu.com/explore/*"
    type: parse_as_content
    priority: 100
    note: "小红书笔记"

  - pattern: "xhslink.com/*"
    type: parse_as_content
    priority: 100
    note: "小红书短链"

  - pattern: "zhihu.com/question/*"
    type: parse_as_content
