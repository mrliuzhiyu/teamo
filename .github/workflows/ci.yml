name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ------------------------------------------------------------
  # 前端 lint + type-check（单平台够用，Linux 最快）
  # ------------------------------------------------------------
  frontend:
    name: Frontend (type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile=false

      - name: Type check
        run: pnpm type-check

      - name: Vite build (frontend only)
        run: pnpm build

  # ------------------------------------------------------------
  # Rust 检查 + Tauri 三平台 build 矩阵
  # ------------------------------------------------------------
  tauri:
    name: Tauri build (${{ matrix.platform }})
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-target: aarch64-apple-darwin
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux 系统依赖（webkit2gtk）
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust 缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile=false

      - name: Generate icons (sharp)
        run: pnpm icons

      - name: Regenerate proper .ico / .icns from icon.png
        run: pnpm tauri icon src-tauri/icons/icon.png --output src-tauri/icons

      - name: Build frontend (vite)
        run: pnpm build

      - name: Cargo clippy
        working-directory: src-tauri
        run: cargo clippy --target ${{ matrix.rust-target }} -- -D warnings

      - name: Cargo test
        working-directory: src-tauri
        run: cargo test

      - name: Tauri build (debug, no bundle)
        run: pnpm tauri build --debug --no-bundle --target ${{ matrix.rust-target }}
